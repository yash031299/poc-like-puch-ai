version: '3.9'

services:
  # PostgreSQL database for session and audit log persistence
  postgres:
    image: postgres:15-alpine
    container_name: puch-postgres
    environment:
      POSTGRES_USER: puch_user
      POSTGRES_PASSWORD: puch_password
      POSTGRES_DB: puch_ai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U puch_user -d puch_ai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - puch-net

  # Redis for distributed session state and locks
  redis:
    image: redis:7-alpine
    container_name: puch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - puch-net

  # Jaeger for distributed tracing (optional, disable if not needed)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: puch-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "6831:6831/udp"  # Jaeger agent (default tracing port)
    networks:
      - puch-net

  # Load balancer (nginx) for 3-instance setup
  lb:
    image: nginx:alpine
    container_name: puch-lb
    ports:
      - "8000:8000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
      - api-3
    networks:
      - puch-net
    restart: unless-stopped

  # API Instance 1
  api-1:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: puch-api-1
    environment:
      PORT: 8001
      INSTANCE_ID: 1
      INSTANCE_NUM: 1
      INSTANCE_TOTAL: 3
      MAX_CONNECTIONS: 200
      LOG_LEVEL: INFO
      DEV_MODE: "false"
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://puch_user:puch_password@postgres:5432/puch_ai_db
      JAEGER_AGENT_HOST: jaeger
      JAEGER_AGENT_PORT: 6831
      GRACEFUL_SHUTDOWN_TIMEOUT_S: 30
    expose:
      - "8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - puch-net
    restart: unless-stopped

  # API Instance 2
  api-2:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: puch-api-2
    environment:
      PORT: 8002
      INSTANCE_ID: 2
      INSTANCE_NUM: 2
      INSTANCE_TOTAL: 3
      MAX_CONNECTIONS: 200
      LOG_LEVEL: INFO
      DEV_MODE: "false"
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://puch_user:puch_password@postgres:5432/puch_ai_db
      JAEGER_AGENT_HOST: jaeger
      JAEGER_AGENT_PORT: 6831
      GRACEFUL_SHUTDOWN_TIMEOUT_S: 30
    expose:
      - "8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - puch-net
    restart: unless-stopped

  # API Instance 3
  api-3:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: puch-api-3
    environment:
      PORT: 8003
      INSTANCE_ID: 3
      INSTANCE_NUM: 3
      INSTANCE_TOTAL: 3
      MAX_CONNECTIONS: 200
      LOG_LEVEL: INFO
      DEV_MODE: "false"
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://puch_user:puch_password@postgres:5432/puch_ai_db
      JAEGER_AGENT_HOST: jaeger
      JAEGER_AGENT_PORT: 6831
      GRACEFUL_SHUTDOWN_TIMEOUT_S: 30
    expose:
      - "8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - puch-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  puch-net:
    driver: bridge
