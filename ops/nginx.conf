# Nginx load balancer configuration for 3-instance API setup
# Distributes WebSocket connections across 3 backend instances
# Auto-reconnects on instance failure

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Enhanced logging with request time and upstream info
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Upstream group: 3 backend API instances
    upstream puch_api {
        least_conn;  # Load balancing: least connections (better for WebSockets)
        
        # API instance 1
        server api-1:8001 max_fails=3 fail_timeout=10s;
        
        # API instance 2
        server api-2:8002 max_fails=3 fail_timeout=10s;
        
        # API instance 3
        server api-3:8003 max_fails=3 fail_timeout=10s;
        
        # Keep upstream connection pool for faster reconnects
        keepalive 32;
    }

    server {
        listen 8000;
        server_name _;

        # Health check endpoint (returns 200 if at least one backend is healthy)
        location /health {
            access_log off;
            try_files /nonexistent @health;
        }

        location @health {
            proxy_pass http://puch_api;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            
            # Short timeout for health checks
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
            
            access_log off;
        }

        # WebSocket endpoint for Exotel AgentStream
        location /stream {
            proxy_pass http://puch_api;
            
            # WebSocket upgrade headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Pass through query parameters (sample-rate)
            proxy_pass_request_args on;
            
            # Client identification
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
            
            # Timeouts: WebSocket connections can be long-lived
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            
            # Buffering off for streaming (WebSocket binary frames)
            proxy_buffering off;
            proxy_request_buffering off;
            
            # Socket options for stability
            proxy_socket_keepalive on;
        }

        # Passthru endpoint for Exotel stream end notifications
        location /passthru {
            proxy_pass http://puch_api;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Default route
        location / {
            return 404;
        }

        # Server status (nginx admin use)
        location /nginx-status {
            stub_status on;
            access_log off;
        }
    }
}
