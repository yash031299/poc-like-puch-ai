apiVersion: v1
kind: Namespace
metadata:
  name: puch-ai

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: puch-config
  namespace: puch-ai
data:
  # Scaling configuration
  MAX_CONNECTIONS: "200"
  MAX_CONNECTIONS_PER_POD: "200"
  GRACEFUL_SHUTDOWN_TIMEOUT_S: "30"
  
  # Performance tuning
  WORKER_THREADS: "4"
  CONNECTION_POOL_SIZE: "50"
  
  # Observability
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"

---
apiVersion: v1
kind: Secret
metadata:
  name: puch-secrets
  namespace: puch-ai
type: Opaque
stringData:
  # Database credentials (use separate Secret in production)
  DATABASE_URL: "postgresql://puch_user:puch_password@puch-postgres:5432/puch_ai_db"
  # Redis URL for distributed state and locks
  REDIS_URL: "redis://puch-redis:6379/0"
  # Gemini API key (optional for production)
  GEMINI_API_KEY: ""
  # Google Cloud credentials (use Secret mounted file in production)
  GOOGLE_APPLICATION_CREDENTIALS: "/etc/puch-secrets/gcp-creds.json"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: puch-api
  namespace: puch-ai
  labels:
    app: puch-ai
    component: api
spec:
  serviceName: puch-api
  replicas: 3  # 3 instances for load distribution
  selector:
    matchLabels:
      app: puch-ai
      component: api
  
  template:
    metadata:
      labels:
        app: puch-ai
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    
    spec:
      # Anti-affinity: spread across nodes for resilience
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - puch-ai
                topologyKey: kubernetes.io/hostname
      
      # Graceful shutdown
      terminationGracePeriodSeconds: 60
      
      containers:
        - name: api
          image: puch-ai:latest  # Replace with your image registry
          imagePullPolicy: IfNotPresent
          
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          
          env:
            - name: PORT
              value: "8000"
            - name: INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: INSTANCE_NUM
              value: "3"  # Total instances
            
            # Load from ConfigMap
            - name: MAX_CONNECTIONS
              valueFrom:
                configMapKeyRef:
                  name: puch-config
                  key: MAX_CONNECTIONS
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: puch-config
                  key: LOG_LEVEL
            - name: GRACEFUL_SHUTDOWN_TIMEOUT_S
              valueFrom:
                configMapKeyRef:
                  name: puch-config
                  key: GRACEFUL_SHUTDOWN_TIMEOUT_S
            
            # Load from Secrets
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: puch-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: puch-secrets
                  key: REDIS_URL
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: puch-secrets
                  key: GEMINI_API_KEY
                  optional: true
          
          # Health checks for K8s orchestration
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          # Resource requests and limits
          resources:
            requests:
              cpu: "500m"           # Request 500m CPU
              memory: "512Mi"       # Request 512Mi memory (1GB base + 5MB per active call)
            limits:
              cpu: "2000m"          # Hard limit: 2 CPUs
              memory: "2Gi"         # Hard limit: 2GB
          
          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      
      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: puch-api
  namespace: puch-ai
  labels:
    app: puch-ai
    component: api
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  selector:
    app: puch-ai
    component: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: puch-api-lb
  namespace: puch-ai
  labels:
    app: puch-ai
    component: api
spec:
  type: LoadBalancer
  selector:
    app: puch-ai
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: puch-api-hpa
  namespace: puch-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: puch-api
  minReplicas: 3
  maxReplicas: 10  # Scale up to 10 instances for 2000+ concurrent
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # Scale up when CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80  # Scale up when memory > 80%
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: puch-api-pdb
  namespace: puch-ai
spec:
  minAvailable: 2  # Always keep 2 replicas available
  selector:
    matchLabels:
      app: puch-ai
      component: api
